<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockMNG — Employee Management System</title>
    <style>
        :root {
            --bg: #1a1d23;
            --surface: #252830;
            --card: #2c3039;
            --primary: #d4a853;
            --primary-glow: #f0c060;
            --accent: #4a9e8e;
            --danger: #e0556a;
            --success: #5cb878;
            --text: #e8e6e3;
            --text-secondary: #a8a5a0;
            --border: #3a3d45;
            --input-bg: #1e2128;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        /* ---- NAVBAR ---- */
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }
        .logo {
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 1px;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo .rock {
            font-size: 1.5rem;
        }
        .nav-links {
            display: flex;
            gap: 0.3rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a,
        .nav-links button {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            padding: 0.45rem 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all var(--transition);
            border: none;
            background: transparent;
            white-space: nowrap;
        }
        .nav-links a:hover,
        .nav-links button:hover {
            color: var(--primary-glow);
            background: rgba(212, 168, 83, 0.08);
        }
        .nav-links a.active {
            background: rgba(212, 168, 83, 0.15);
            color: var(--primary);
        }
        .hamburger {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* ---- MAIN CONTAINER ---- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* ---- PAGE ---- */
        .page {
            display: none;
            animation: fadeSlide 0.4s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---- CARDS ---- */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .card:hover {
            border-color: rgba(212, 168, 83, 0.3);
        }
        .card-header {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.8rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.2rem;
            text-align: center;
        }
        .stat-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }

        /* ---- BUTTONS ---- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.55rem 1.3rem;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            text-decoration: none;
        }
        .btn-primary {
            background: var(--primary);
            color: #1a1d23;
        }
        .btn-primary:hover {
            background: var(--primary-glow);
            box-shadow: 0 4px 18px rgba(212, 168, 83, 0.3);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: #1a1d23;
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-sm {
            padding: 0.35rem 0.9rem;
            font-size: 0.75rem;
        }
        .btn-xs {
            padding: 0.25rem 0.6rem;
            font-size: 0.7rem;
            border-radius: 15px;
        }

        /* ---- FORMS ---- */
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.65rem 0.9rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border var(--transition);
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* ---- TABLE ---- */
        .table-wrap {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th,
        td {
            padding: 0.7rem 0.8rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: var(--surface);
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }
        th:hover {
            color: var(--primary-glow);
        }
        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }
        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-active {
            background: rgba(92, 184, 120, 0.2);
            color: var(--success);
        }
        .badge-inactive {
            background: rgba(160, 160, 160, 0.2);
            color: #999;
        }
        .badge-terminated {
            background: rgba(224, 85, 106, 0.2);
            color: var(--danger);
        }

        /* ---- TOAST ---- */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast {
            padding: 0.8rem 1.4rem;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 0.85rem;
            animation: slideIn 0.4s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            max-width: 380px;
        }
        .toast-success {
            background: var(--success);
        }
        .toast-error {
            background: var(--danger);
        }
        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ---- MODAL ---- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.8rem;
            width: 90%;
            max-width: 620px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.3rem;
            cursor: pointer;
        }

        /* ---- PAGINATION ---- */
        .pagination {
            display: flex;
            gap: 0.3rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .pagination button {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all var(--transition);
        }
        .pagination button.active {
            background: var(--primary);
            color: #1a1d23;
            border-color: var(--primary);
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .stat-grid {
                grid-template-columns: 1fr 1fr;
            }
            .nav-links {
                display: none;
                position: fixed;
                top: 56px;
                left: 0;
                width: 100%;
                background: var(--surface);
                flex-direction: column;
                padding: 1rem;
                gap: 0.5rem;
                border-bottom: 1px solid var(--border);
            }
            .nav-links.open {
                display: flex;
            }
            .hamburger {
                display: block;
            }
            .modal {
                width: 95%;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo" onclick="navigateTo('dashboard')"><span class="rock">🪨</span> RockMNG</div>
        <button class="hamburger" id="hamburger" onclick="toggleNav()">☰</button>
        <div class="nav-links" id="navLinks">
            <a onclick="navigateTo('dashboard')" id="navDash">📊 Dashboard</a>
            <a onclick="navigateTo('employees')" id="navEmp">👥 Employees</a>
            <a onclick="navigateTo('reports')" id="navRep">📋 Reports</a>
            <button class="btn btn-sm btn-outline" id="logoutBtn" onclick="logout()" style="display:none;">🚪 Logout</button>
        </div>
    </nav>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- MAIN CONTENT -->
    <div class="container" id="mainContent"></div>

    <!-- MODAL OVERLAY -->
    <div id="modalOverlay" style="display:none;" class="modal-overlay" onclick="closeModal(event)"></div>

    <script>
        // ==================== DATA ENGINE ====================
        const DB_KEY = 'rockmng_db';
        const defaultDB = {
            users: {
                'admin': { password: 'admin123', role: 'admin', name: 'Raj Gautam' },
                'manager': { password: 'manager123', role: 'manager', name: 'Priya Sharma' }
            },
            employees: [
                { id: '1', firstName: 'Amit', lastName: 'Kumar', email: 'amit@rockmng.com', phone: '9876543210',
                    department: 'Engineering', position: 'Software Developer', hireDate: '2024-03-15', salary: 85000,
                    status: 'active' },
                { id: '2', firstName: 'Sneha', lastName: 'Patel', email: 'sneha@rockmng.com', phone: '9876543211',
                    department: 'Design', position: 'UI/UX Designer', hireDate: '2024-05-20', salary: 72000,
                    status: 'active' },
                { id: '3', firstName: 'Rohan', lastName: 'Singh', email: 'rohan@rockmng.com', phone: '9876543212',
                    department: 'Engineering', position: 'DevOps Engineer', hireDate: '2023-11-01', salary: 95000,
                    status: 'active' },
                { id: '4', firstName: 'Meera', lastName: 'Nair', email: 'meera@rockmng.com', phone: '9876543213',
                    department: 'Marketing', position: 'Marketing Manager', hireDate: '2023-08-10', salary: 78000,
                    status: 'active' },
                { id: '5', firstName: 'Vikram', lastName: 'Reddy', email: 'vikram@rockmng.com', phone: '9876543214',
                    department: 'Engineering', position: 'Senior Developer', hireDate: '2022-06-25', salary: 120000,
                    status: 'active' },
                { id: '6', firstName: 'Ananya', lastName: 'Gupta', email: 'ananya@rockmng.com', phone: '9876543215',
                    department: 'HR', position: 'HR Manager', hireDate: '2023-01-18', salary: 68000, status: 'active' },
                { id: '7', firstName: 'Karan', lastName: 'Joshi', email: 'karan@rockmng.com', phone: '9876543216',
                    department: 'Finance', position: 'Accountant', hireDate: '2024-07-05', salary: 62000,
                status: 'inactive' },
                { id: '8', firstName: 'Divya', lastName: 'Sharma', email: 'divya@rockmng.com', phone: '9876543217',
                    department: 'Engineering', position: 'QA Engineer', hireDate: '2025-02-14', salary: 70000,
                    status: 'active' },
            ],
            nextId: 9
        };

        let db = JSON.parse(localStorage.getItem(DB_KEY)) || defaultDB;
        if (!localStorage.getItem(DB_KEY)) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

        function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

        let currentUser = null;
        let currentPage = 'dashboard';
        let employeeFilter = { search: '', department: '', status: '', sortBy: 'firstName', sortDir: 'asc', page: 1,
            limit: 5 };
        let editingEmployee = null;
        let modalOpen = false;

        // ==================== UTILS ====================
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            container.appendChild(t);
            setTimeout(() => { t.style.opacity = '0';
                t.style.transition = 'opacity 0.3s';
                setTimeout(() => t.remove(), 300); }, 3000);
        }

        function toggleNav() { document.getElementById('navLinks').classList.toggle('open'); }

        function formatCurrency(n) { return '₹' + Number(n).toLocaleString('en-IN'); }

        function formatDate(d) { return new Date(d).toLocaleDateString('en-IN', { year: 'numeric', month: 'short',
                day: 'numeric' }); }

        function generateId() { return String(db.nextId++);
            saveDB(); }

        // ==================== NAVIGATION ====================
        function navigateTo(page) {
            currentPage = page;
            document.getElementById('navLinks').classList.remove('open');
            updateNav();
            renderPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateNav() {
            const loggedIn = !!currentUser;
            document.getElementById('logoutBtn').style.display = loggedIn ? 'inline-flex' : 'none';
            document.querySelectorAll('#navLinks a').forEach(a => a.classList.remove('active'));
            const activeMap = { dashboard: 'navDash', employees: 'navEmp', reports: 'navRep' };
            const activeId = activeMap[currentPage];
            if (activeId) document.getElementById(activeId)?.classList.add('active');
        }

        // ==================== AUTH ====================
        function login(username, password) {
            const user = db.users[username];
            if (user && user.password === password) {
                currentUser = { username, ...user };
                showToast('Welcome, ' + user.name + '!', 'success');
                navigateTo('dashboard');
                return true;
            }
            showToast('Invalid credentials', 'error');
            return false;
        }

        function logout() {
            currentUser = null;
            navigateTo('login');
            showToast('Logged out', 'success');
        }

        // ==================== MODAL ====================
        function openModal(html) {
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('modalOverlay').innerHTML = `<div class="modal" onclick="event.stopPropagation()">${html}</div>`;
            modalOpen = true;
        }

        function closeModal(e) {
            if (e && e.target !== document.getElementById('modalOverlay')) return;
            document.getElementById('modalOverlay').style.display = 'none';
            modalOpen = false;
            editingEmployee = null;
        }

        // ==================== RENDER ENGINE ====================
        function renderPage() {
            const main = document.getElementById('mainContent');
            if (!currentUser && currentPage !== 'login') { currentPage = 'login'; }
            switch (currentPage) {
                case 'login':
                    main.innerHTML = loginPageHTML();
                    break;
                case 'dashboard':
                    main.innerHTML = dashboardHTML();
                    break;
                case 'employees':
                    main.innerHTML = employeesHTML();
                    break;
                case 'reports':
                    main.innerHTML = reportsHTML();
                    break;
                default:
                    main.innerHTML = dashboardHTML();
            }
            attachEvents();
        }

        function attachEvents() {
            if (currentPage === 'login') {
                document.getElementById('loginForm')?.addEventListener('submit', e => {
                    e.preventDefault();
                    const u = document.getElementById('loginUser').value.trim();
                    const p = document.getElementById('loginPass').value;
                    login(u, p);
                });
            }
            if (currentPage === 'employees') {
                document.getElementById('empSearch')?.addEventListener('input', e => { employeeFilter.search = e.target
                        .value;
                    employeeFilter.page = 1;
                    renderEmployeeTable(); });
                document.getElementById('empDeptFilter')?.addEventListener('change', e => { employeeFilter.department = e
                        .target.value;
                    employeeFilter.page = 1;
                    renderEmployeeTable(); });
                document.getElementById('empStatusFilter')?.addEventListener('change', e => { employeeFilter.status = e
                        .target.value;
                    employeeFilter.page = 1;
                    renderEmployeeTable(); });
            }
        }

        // ==================== PAGE HTML ====================
        function loginPageHTML() {
            return `
            <div style="max-width:400px;margin:3rem auto;">
              <div class="card">
                <div style="text-align:center;margin-bottom:1.5rem;">
                  <div style="font-size:3rem;">🪨</div>
                  <h1 style="font-size:1.6rem;color:var(--primary);">RockMNG</h1>
                  <p style="color:var(--text-secondary);">Employee Management System</p>
                </div>
                <form id="loginForm">
                  <div class="form-group"><label>Username</label><input type="text" id="loginUser" required placeholder="admin"></div>
                  <div class="form-group"><label>Password</label><input type="password" id="loginPass" required placeholder="admin123"></div>
                  <button type="submit" class="btn btn-primary" style="width:100%;">🔐 Login</button>
                </form>
                <p style="text-align:center;margin-top:0.8rem;font-size:0.78rem;color:var(--text-secondary);">Demo: admin/admin123 or manager/manager123</p>
              </div>
            </div>`;
        }

        function dashboardHTML() {
            const emps = db.employees;
            const total = emps.length;
            const active = emps.filter(e => e.status === 'active').length;
            const depts = [...new Set(emps.map(e => e.department))];
            const totalSalary = emps.filter(e => e.status === 'active').reduce((s, e) => s + (e.salary || 0), 0);
            const recentHires = [...emps].sort((a, b) => new Date(b.hireDate) - new Date(a.hireDate)).slice(0, 5);
            return `
            <h2 style="margin-bottom:1rem;">📊 Dashboard</h2>
            <div class="stat-grid" style="margin-bottom:1.5rem;">
              <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Employees</div></div>
              <div class="stat-card"><div class="stat-value" style="color:var(--success);">${active}</div><div class="stat-label">Active</div></div>
              <div class="stat-card"><div class="stat-value" style="color:var(--accent);">${depts.length}</div><div class="stat-label">Departments</div></div>
              <div class="stat-card"><div class="stat-value">${formatCurrency(totalSalary)}</div><div class="stat-label">Monthly Payroll</div></div>
            </div>
            <div class="card">
              <div class="card-header">🆕 Recent Hires</div>
              <div class="table-wrap"><table><tr><th>Name</th><th>Department</th><th>Position</th><th>Hire Date</th><th>Status</th></tr>
              ${recentHires.map(e=>`<tr><td>${e.firstName} ${e.lastName}</td><td>${e.department}</td><td>${e.position}</td><td>${formatDate(e.hireDate)}</td><td><span class="badge badge-${e.status}">${e.status}</span></td></tr>`).join('')}
              </table></div>
            </div>`;
        }

        function employeesHTML() {
            const depts = [...new Set(db.employees.map(e => e.department))];
            return `
            <h2 style="margin-bottom:1rem;">👥 Employee Directory</h2>
            <div class="card" style="margin-bottom:1rem;">
              <div style="display:flex;gap:0.8rem;flex-wrap:wrap;align-items:center;margin-bottom:0.8rem;">
                <input type="text" id="empSearch" placeholder="🔍 Search name or email..." style="flex:2;min-width:180px;padding:0.5rem 0.8rem;background:var(--input-bg);border:1px solid var(--border);border-radius:20px;color:var(--text);outline:none;">
                <select id="empDeptFilter" style="flex:1;min-width:130px;padding:0.5rem 0.8rem;background:var(--input-bg);border:1px solid var(--border);border-radius:20px;color:var(--text);outline:none;">
                  <option value="">All Departments</option>${depts.map(d=>`<option value="${d}">${d}</option>`).join('')}</select>
                <select id="empStatusFilter" style="flex:1;min-width:120px;padding:0.5rem 0.8rem;background:var(--input-bg);border:1px solid var(--border);border-radius:20px;color:var(--text);outline:none;">
                  <option value="">All Status</option><option value="active">Active</option><option value="inactive">Inactive</option><option value="terminated">Terminated</option></select>
                <button class="btn btn-primary btn-sm" onclick="openAddEmployeeModal()">+ Add Employee</button>
              </div>
              <div class="table-wrap" id="empTable"></div>
              <div class="pagination" id="empPagination"></div>
            </div>`;
        }

        function reportsHTML() {
            const depts = [...new Set(db.employees.map(e => e.department))];
            const activeCount = db.employees.filter(e => e.status === 'active').length;
            const deptCounts = depts.map(d => ({ dept: d, count: db.employees.filter(e => e.department === d && e.status ===
                    'active').length }));
            const avgSalary = db.employees.filter(e => e.status === 'active').reduce((s, e) => s + (e.salary || 0), 0) / (
                activeCount || 1);
            return `
            <h2 style="margin-bottom:1rem;">📋 Reports & Analytics</h2>
            <div class="stat-grid" style="margin-bottom:1.5rem;">
              <div class="stat-card"><div class="stat-value">${activeCount}</div><div class="stat-label">Active Workforce</div></div>
              <div class="stat-card"><div class="stat-value">${formatCurrency(Math.round(avgSalary))}</div><div class="stat-label">Average Salary</div></div>
              <div class="stat-card"><div class="stat-value">${depts.length}</div><div class="stat-label">Departments</div></div>
              <div class="stat-card"><div class="stat-value">${db.employees.length}</div><div class="stat-label">Total Records</div></div>
            </div>
            <div class="card" style="margin-bottom:1rem;">
              <div class="card-header">📈 Department Distribution</div>
              ${deptCounts.map(d=>`<div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border);"><span>${d.dept}</span><span style="color:var(--primary);font-weight:600;">${d.count} employees</span></div>`).join('')}
            </div>
            <div style="display:flex;gap:0.8rem;flex-wrap:wrap;">
              <button class="btn btn-primary" onclick="exportData('csv')">📥 Export CSV</button>
              <button class="btn btn-outline" onclick="exportData('json')">📄 Export JSON</button>
              <button class="btn btn-outline" onclick="showToast('PDF report generated! (simulated)','success')">📕 Generate PDF</button>
            </div>`;
        }

        // ==================== EMPLOYEE TABLE ====================
        function renderEmployeeTable() {
            let filtered = [...db.employees];
            const q = employeeFilter.search.toLowerCase();
            if (q) filtered = filtered.filter(e => (e.firstName + ' ' + e.lastName + ' ' + e.email).toLowerCase().includes(
                q));
            if (employeeFilter.department) filtered = filtered.filter(e => e.department === employeeFilter.department);
            if (employeeFilter.status) filtered = filtered.filter(e => e.status === employeeFilter.status);
            // Sort
            filtered.sort((a, b) => {
                const va = (a[employeeFilter.sortBy] || '').toString().toLowerCase();
                const vb = (b[employeeFilter.sortBy] || '').toString().toLowerCase();
                return employeeFilter.sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
            });
            const totalPages = Math.ceil(filtered.length / employeeFilter.limit) || 1;
            const start = (employeeFilter.page - 1) * employeeFilter.limit;
            const pageItems = filtered.slice(start, start + employeeFilter.limit);
            document.getElementById('empTable').innerHTML = `
            <table><tr>
              <th onclick="sortTable('firstName')">Name ${employeeFilter.sortBy==='firstName'?(employeeFilter.sortDir==='asc'?'▲':'▼'):''}</th>
              <th onclick="sortTable('email')">Email</th>
              <th onclick="sortTable('department')">Dept</th>
              <th onclick="sortTable('position')">Position</th>
              <th onclick="sortTable('hireDate')">Hired</th>
              <th>Status</th><th>Actions</th></tr>
            ${pageItems.map(e=>`<tr>
              <td><strong>${e.firstName} ${e.lastName}</strong></td><td>${e.email}</td><td>${e.department}</td>
              <td>${e.position}</td><td>${formatDate(e.hireDate)}</td>
              <td><span class="badge badge-${e.status}">${e.status}</span></td>
              <td>
                <button class="btn btn-xs btn-outline" onclick="viewEmployee('${e.id}')">👁️</button>
                <button class="btn btn-xs btn-outline" onclick="openEditEmployeeModal('${e.id}')">✏️</button>
                <button class="btn btn-xs btn-danger" onclick="deleteEmployee('${e.id}')">🗑️</button>
              </td></tr>`).join('')}
            </table>`;
            // Pagination
            let pagHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                pagHTML +=
                    `<button class="${i===employeeFilter.page?'active':''}" onclick="goToPage(${i})">${i}</button>`;
            }
            document.getElementById('empPagination').innerHTML = pagHTML;
        }

        function sortTable(field) {
            if (employeeFilter.sortBy === field) employeeFilter.sortDir = employeeFilter.sortDir === 'asc' ? 'desc' :
                'asc';
            else { employeeFilter.sortBy = field;
                employeeFilter.sortDir = 'asc'; }
            renderEmployeeTable();
        }

        function goToPage(p) { employeeFilter.page = p;
            renderEmployeeTable(); }

        // ==================== EMPLOYEE CRUD ====================
        function openAddEmployeeModal() {
            editingEmployee = null;
            openModal(employeeFormHTML({}));
        }

        function openEditEmployeeModal(id) {
            const emp = db.employees.find(e => e.id === id);
            if (!emp) return;
            editingEmployee = id;
            openModal(employeeFormHTML(emp));
        }

        function employeeFormHTML(emp) {
            const isEdit = !!emp.id;
            return `
            <div class="modal-header"><h3>${isEdit?'Edit':'Add'} Employee</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
            <form onsubmit="saveEmployee(event, '${emp.id||''}')">
              <div class="form-row">
                <div class="form-group"><label>First Name *</label><input type="text" id="efFirstName" value="${emp.firstName||''}" required></div>
                <div class="form-group"><label>Last Name *</label><input type="text" id="efLastName" value="${emp.lastName||''}" required></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>Email *</label><input type="email" id="efEmail" value="${emp.email||''}" required></div>
                <div class="form-group"><label>Phone</label><input type="text" id="efPhone" value="${emp.phone||''}"></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>Department *</label><select id="efDept" required>${['Engineering','Design','Marketing','HR','Finance','Operations','Sales'].map(d=>`<option value="${d}" ${emp.department===d?'selected':''}>${d}</option>`).join('')}</select></div>
                <div class="form-group"><label>Position *</label><input type="text" id="efPosition" value="${emp.position||''}" required></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>Hire Date *</label><input type="date" id="efHireDate" value="${emp.hireDate||''}" required></div>
                <div class="form-group"><label>Salary</label><input type="number" id="efSalary" value="${emp.salary||''}" step="1000"></div>
              </div>
              <div class="form-group"><label>Status</label><select id="efStatus">${['active','inactive','terminated'].map(s=>`<option value="${s}" ${emp.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
              <button type="submit" class="btn btn-primary" style="width:100%;">💾 ${isEdit?'Update':'Create'} Employee</button>
            </form>`;
        }

        function saveEmployee(e, id) {
            e.preventDefault();
            const data = {
                firstName: document.getElementById('efFirstName').value.trim(),
                lastName: document.getElementById('efLastName').value.trim(),
                email: document.getElementById('efEmail').value.trim(),
                phone: document.getElementById('efPhone').value.trim(),
                department: document.getElementById('efDept').value,
                position: document.getElementById('efPosition').value.trim(),
                hireDate: document.getElementById('efHireDate').value,
                salary: parseInt(document.getElementById('efSalary').value) || 0,
                status: document.getElementById('efStatus').value,
            };
            if (!data.firstName || !data.email) return showToast('Please fill required fields', 'error');
            if (id) {
                const idx = db.employees.findIndex(e => e.id === id);
                if (idx >= 0) { db.employees[idx] = { ...db.employees[idx], ...data };
                    saveDB();
                    showToast('Employee updated!'); }
            } else {
                data.id = generateId();
                db.employees.push(data);
                saveDB();
                showToast('Employee added!');
            }
            closeModal();
            if (currentPage === 'employees') renderEmployeeTable();
            if (currentPage === 'dashboard') renderPage();
        }

        function viewEmployee(id) {
            const emp = db.employees.find(e => e.id === id);
            if (!emp) return;
            openModal(`
            <div class="modal-header"><h3>👤 Employee Profile</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;font-size:0.9rem;">
              <p><strong>Name:</strong> ${emp.firstName} ${emp.lastName}</p><p><strong>Email:</strong> ${emp.email}</p>
              <p><strong>Phone:</strong> ${emp.phone||'N/A'}</p><p><strong>Department:</strong> ${emp.department}</p>
              <p><strong>Position:</strong> ${emp.position}</p><p><strong>Hire Date:</strong> ${formatDate(emp.hireDate)}</p>
              <p><strong>Salary:</strong> ${formatCurrency(emp.salary)}</p><p><strong>Status:</strong> <span class="badge badge-${emp.status}">${emp.status}</span></p>
            </div>
            <div style="margin-top:1rem;display:flex;gap:0.5rem;">
              <button class="btn btn-sm btn-outline" onclick="closeModal();openEditEmployeeModal('${emp.id}')">✏️ Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deleteEmployee('${emp.id}');closeModal();">🗑️ Delete</button>
            </div>`);
        }

        function deleteEmployee(id) {
            if (!confirm('Delete this employee?')) return;
            db.employees = db.employees.filter(e => e.id !== id);
            saveDB();
            showToast('Employee deleted');
            if (currentPage === 'employees') renderEmployeeTable();
            if (currentPage === 'dashboard') renderPage();
        }

        // ==================== EXPORT ====================
        function exportData(format) {
            const data = db.employees.map(e => ({
                Name: e.firstName + ' ' + e.lastName,
                Email: e.email,
                Phone: e.phone,
                Department: e.department,
                Position: e.position,
                HireDate: e.hireDate,
                Salary: e.salary,
                Status: e.status
            }));
            let content, mime, filename;
            if (format === 'csv') {
                const headers = Object.keys(data[0]);
                content = headers.join(',') + '\n' + data.map(r => headers.map(h => '"' + (r[h] || '') + '"').join(',')).join(
                    '\n');
                mime = 'text/csv';
                filename = 'rockmng_employees.csv';
            } else {
                content = JSON.stringify(data, null, 2);
                mime = 'application/json';
                filename = 'rockmng_employees.json';
            }
            const blob = new Blob([content], { type: mime });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            showToast(`Exported as ${format.toUpperCase()}!`);
        }

        // ==================== INIT ====================
        function init() {
            currentUser = null;
            navigateTo('login');
            updateNav();
        }
        init();
        console.log('🪨 RockMNG — Employee Management System Ready');
        console.log('Demo: admin/admin123 | manager/manager123');
    </script>
</body>
</html>
